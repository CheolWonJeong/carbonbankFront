<!DOCTYPE html>
<html lang="ko">
<head>
	<title>탄소뱅크</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width" />
	<meta name="keywords" content="탄소뱅크" />
    <meta name="description" content="탄소뱅크" />
    <meta property="og:image" content="../resources/images/opengraph.png" />
    <link rel="icon" href="../resources/images/favicon.png">
	<link rel="stylesheet" href="../resources/css/common.css" >
    <script type="text/javascript" src="../resources/js/jquery-3.6.0.min.js"></script>

</head>
<body>

    <div class="carbon-join">
        <h1>서비스 이용약관 동의</h1>
        <div class="join-text">
            서비스 이용을 위해 아래 약관에 동의해 주세요.
        </div>

        <ul class="join-cheklist">
            <li>
                <input type="checkbox" name="" id="">
                모든 약관에 전체 동의합니다.
            </li>
            <li>
                <input type="checkbox" name="" id="">
                (필수) 서비스 이용약관
                <a href="#">보기</a>
            </li>
            <li>
                <input type="checkbox" name="" id="">
                (필수) 개인정보 수집 및 이용 동의
                <a href="#">보기</a>
            </li>
            <li>
                <input type="checkbox" name="" id="">
                (선택) 서비스 알림 수신 동의
                <a href="#">보기</a>
            </li>
        </ul>
    </div>
    <div class="join-btn">
        <button type="button" class="btn-gray">취소</button>
        <button type="button" class="btn-blue">확인</button>
    </div>

</body>
</html>
