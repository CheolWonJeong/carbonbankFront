<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile/layout/layour}">
   <th:block layout:fragment="head" th:insert="~{@{/mobile/layout/head}}"></th:block>

<body>
   <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=91a6d29cc76983b79aeb44c1caa12200"></script>
   <script type="text/javascript">
		   let storeList = [];
		   let map = null;
		   let markers = [];
		   let infowindow = null;

      async function initializeChecklist(keyword) {
         try {
            const response = await $.ajax({
               url: 'cbStoreSearchProc',
               type: 'GET',
               data: { keyword: keyword },
               dataType: 'json'
            });
            storeList = response.storeList || [];
            console.log("가맹점 리스트:", storeList);
            return storeList;
         } catch (error) {
            console.error('가맹점 검색 실패:', error);
            alert('가맹점을 검색하는데 실패했습니다.');
            return [];
         }
      }

      function initMap() {
         // 마커를 클릭하면 장소명을 표출할 인포윈도우
         var infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

         navigator.geolocation.getCurrentPosition(
                 function(position) {
                    // const lat = 37.566826; // 위도
                    // const lng = 126.9786567; // 경도
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    const latElem = document.getElementById('lat');
                    const lngElem = document.getElementById('lng');

                    if (latElem) latElem.textContent = lat;
                    if (lngElem) lngElem.textContent = lng;

                    const container = document.getElementById('map');
                    const options = {
                       center: new kakao.maps.LatLng(lat, lng),
                       level: 3
                    };

                    const map = new kakao.maps.Map(container, options);

                    // 기본 마커
                    const markerPosition = new kakao.maps.LatLng(lat, lng);
                    const marker = new kakao.maps.Marker({
                       position: markerPosition
                    });
                    marker.setDraggable(false);
                    marker.setMap(map);
                 });
      }

      document.addEventListener('DOMContentLoaded', function () {
         // 페이지 로드 시 initMap 호출
         initMap();
      });


      // 기존 마커 제거 함수
      function removeMarkers() {
         markers.forEach(marker => marker.setMap(null));
         markers = [];
      }

      // 지도 초기화 및 마커 표시 함수
      function displayMap(lat, lng, stores) {
         const container = document.getElementById('map');
         if (!container) {
            console.error("지도 컨테이너를 찾을 수 없습니다.");
            return;
         }

         const options = {
            center: new kakao.maps.LatLng(lat, lng),
            level: 3
         };

      // 새로운 지도 생성
         if (map) {
            map = new kakao.maps.Map(container, options); // 지도 갱신
         } else {
            map = new kakao.maps.Map(container, options); // 초기 지도 생성
         }

         // 인포윈도우 초기화
         if (!infowindow) infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

         // 가맹점 마커
         if(stores.length > 0) {
             stores.forEach((store, index) => {
                 const storePosition = new kakao.maps.LatLng(store.storeY, store.storeX);
                 const storeMarker = new kakao.maps.Marker({
                    position: storePosition,
                    map: map
                 });
                 markers.push(storeMarker);
                 kakao.maps.event.addListener(storeMarker, 'click', function() {
                    infowindow.setContent('<div style="padding:5px;">' + (store.storeName || '알 수 없는 장소') + '</div>');
                    infowindow.open(map, storeMarker);
                 });
              });
         }


         // 지도 범위 조정
         if (stores.length > 0 || lat) {
            const bounds = new kakao.maps.LatLngBounds();
            stores.forEach(store => bounds.extend(new kakao.maps.LatLng(store.storeY, store.storeX)));
            map.setBounds(bounds);
         }
      }

      // 검색 버튼 클릭 시 호출
      function searchStores() {
         const keyword = document.getElementById('keyword').value.trim();
         if (!keyword) {
            alert('검색어를 입력해주세요!');
            return;
         }

         initializeChecklist(keyword).then((stores) => {
            navigator.geolocation.getCurrentPosition(
               function(position) {
                  const lat = position.coords.latitude;
                  const lng = position.coords.longitude;
                  console.log("현재 위치:", lat, lng);

                  const latElem = document.getElementById('lat');
                  const lngElem = document.getElementById('lng');
                  if (latElem) latElem.textContent = lat.toFixed(6);
                  if (lngElem) lngElem.textContent = lng.toFixed(6);

                  removeMarkers();
                  if(stores.length > 0) {
                	  displayMap(lat, lng, stores);
                  } else {
                	  alert('가맹점이 없습니다.')
                	  initMap()
                  }
               },
               function(error) {
                  console.error("위치 정보 요청 오류:", error.message, error.code);
                  const lat = position.coords.latitude;
                  const lng = position.coords.longitude;

                  const latElem = document.getElementById('lat');
                  const lngElem = document.getElementById('lng');
                  if (latElem) latElem.textContent = lat.toFixed(6);
                  if (lngElem) lngElem.textContent = lng.toFixed(6);

                  removeMarkers();
                  displayMap(lat, lng, null);
               }
            );
         });
      }

   </script>

   <div class="wrap">
      <th:block layout:fragment="header" th:insert="~{@{/mobile/layout/headersub}}"></th:block>
      <div class="content-wrap">
         <section class="search-top">
            <h2>녹색실천 매장</h2>
            <p>탄소중립을 실천하는 매장을 만나보세요</p>
            <div class="search-store">
               <input type="text" id="keyword" name="" class="w100">
               <button type="button" onclick= "searchStores()">검색</button>
            </div>
         </section>
         <!-- //carbon-content -->
      </div>
      <!-- //content-wrap -->
      <div id="map" style="width:100%;height:350px;"></div>
      <th:block layout:fragment="footer" th:insert="~{@{/mobile/layout/footer}}"></th:block>
   </div><!-- //wrap -->
</body>
</html>
