<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile/layout/nolayour}">
	<th:block layout:fragment="head" th:insert="~{@{/mobile/layout/nohead}}"></th:block>

<script type="text/javascript">
	$(function(){ 
	});

	$(document).ready(function(){
    	
		//저장버튼 클릭
        $('#LgnProc').on('click', function(event) {
            var param = {
                     "mbrNm" : $('#mbrNm').val() 
                     , "mbrCellNum" : $('#mbrCellNum').val() 
                     , "mbrPwd" : $('#mbrPwd').val() 
               };        
            
            $.ajax({
                url : '/home/cbRegMmeberProc'
                , type : 'POST'
                , dataType : 'JSON'
                , cache : false
                , data : param
                , beforeSend : function( xhr, settings ) { 
                    //loadingbar_show(); 
                }
                , success : function(data, stauts, request) {
    				if (data.procInd == "S") {
    					alert("정상 처리 되었습니다.");
    					location.href = "/main/cbMain.do";
    				} else {
    					alert("처리중 오류가 발생 했습니다.");
    				}

                }
                , error : function(xhr, status) {
                    alert('서비스 장애발생 관리자에게 문의해 주십시요');
                }
                , complete : function(xhr, status) {
                    //loadingbar_hide();
                }    
            });
        });
        
    });
</script>


<body>

    <ul class="carbon-login">
        <li>
            <input type="text" name="" id=""  placeholder="휴대폰 번호를 입력하세요">
        </li>
        <li>
            <input type="password" name="" id=""  placeholder="비밀번호를 입력하세요">
        </li>
        <li>
            <button type="button" class="btn-blue mT10" id="LgnProc">로 그 인</button>
        </li>
        <li class="login-pw"><a href="#">아이디 비밀번호 찾기</a></li>
    </ul>
    <ul class="carbon-joinlink">
        <li class="join-person"><a href="/home/cbRegMmeber,do">회원가입</a></li>
        <li class="join-store"><a href="/home/cbRegStore.do">가맹점가입</a></li>
    </ul>

</body>
</html>
