<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile/layout/layoutno}">
	<th:block layout:fragment="head" th:insert="~{@{/mobile/layout/nohead}}"></th:block>
   <script type="text/javascript" src="/resources/js/common.js"></script>
<script type="text/javascript">
	$(function(){ 
	});

	$(document).ready(function(){
    	
		$("input:text[storeCellNum]").on("keyup", function() {
		      $(this).val($(this).val().replace(/[^0-9]/g,""));
		   });		
		//저장버튼 클릭
        $('#memReg').on('click', function(event) {
        	
        	var storeCeoNm = $('#storeCeoNm').val();
        	var storeCellNum = $('#storeCellNum').val().trim().replace(/-/g, '');
        	var storePwd = $('#storePwd').val();
        	var pwd2 = $('#storePwd2nd').val();
        	
        	if ( storeCeoNm == "") {
        		alert("대표자 성명을 입력 하세요.");
        		return;
        	}
        	if ( storeCellNum == "" ) {
        		alert("휴대폰 번호을 입력 하세요.");
        		return;
        	}
        	if (storePwd != "" && storePwd != pwd2) {
        		alert("패스워드가 일치하지 않습니다.");
        		return;
        	}
            var param = {
                     "storeCeoNm" : storeCeoNm
                     , "storeCellNum" : storeCellNum
                     , "storePwd" : storePwd
               };        
            
            $.ajax({
                url : '/home/cbRegStoreProc'
                , type : 'POST'
                , dataType : 'JSON'
                , cache : false
                , data : param
                , beforeSend : function( xhr, settings ) { 
                    //loadingbar_show(); 
                }
                , success : function(data, stauts, request) {
    				if (data.procInd == "S") {
    					alert("가입을 감사합니다.\n로그인 후 이용하세요.");
    					location.href = "/home/cbLogin.do";
    				} else {
    					alert("처리중 오류가 발생 했습니다.");
    				}

                }
                , error : function(xhr, status) {
                    alert('서비스 장애발생 관리자에게 문의해 주십시요');
                }
                , complete : function(xhr, status) {
                    //loadingbar_hide();
                }    
            });
        });

        $('#regCan').on('click', function(event) {
        	history.back();
        });
		
    });
</script>

<body>
<div class="wrap">
	<div layout:fragment="content">
		<!-- //content-wrap -->
	    <ul class="carbon-join2">
	        <li>
	            <label for="">대표자 성명</label>
	            <input type="text" name="" id="storeCeoNm">
	        </li>
	        <li>
	            <label for="">휴대폰 번호</label>
	            <input type="text" name="" id="storeCellNum" maxlength="13" placeholder="010-1234-5678" oninput="formatPhoneNumber(this)">
	        </li>
	        <li>
	            <label for="">비밀번호(숫자 6자리)</label>
	            <input type="password" maxlength=6 name="" id="storePwd">
	        </li>
	        <li>
	            <label for="">비밀번호 확인</label>
	            <input type="password" maxlength=6 name="" id="storePwd2nd">
	        </li>
	        <li>
	            <label for="">가맹점 회원은 이미 등록되어 있어야 합니다.</label>
	        </li>
	    </ul>
	    <div class="join-btn">
	        <button type="button" class="btn-gray" id="regCan">가입취소</button>
	        <button type="button" class="btn-blue" id="memReg">회원가입</button>
	    </div>
	</div>
</div><!-- //wrap -->
</body>
</html>
