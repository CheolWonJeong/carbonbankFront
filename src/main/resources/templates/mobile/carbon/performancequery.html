<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile/layout/layoutsub}">
	<th:block layout:fragment="head" th:insert="~{@{/mobile/layout/head}}"></th:block>


<body>
	<th:block layout:fragment="header" th:insert="~{@{/mobile/layout/headersub}}"></th:block>
	
	<div layout:fragment="content">
    <div class="content-wrap">
        <div class="qr-search">
            <select id="yyyy" name="" class="sel_type1">
                <option value="2025">2025년</option>
                <option value="2026">2026년</option>
                <option value="2027">2027년</option>
                <option value="">-</option>
            </select>
            <select id="month" name="" class="sel_type1">
			    <option value="" disabled selected>월 선택</option>
			    <th:block th:each="month : ${months}">
			        <option th:value="${month}" th:text="${month}"></option>
			    </th:block>
            </select>
            <button type="button" class="btn-blue">일별조회</button>
            <button type="button" class="btn-blue">월별조회</button>
        </div>

        <section class="carbon-content">
            <div class="board-type1">
                <table>
                    <colgroup>
                        <col />
                        <col style="width:50%;" />
                    </colgroup>
                    <thead>
                        <tr>
                            <th>일자</th>
                            <th>판매건수</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>2005-05-02</td>
                            <td>500</td>
                        </tr>
                        <tr>
                            <td>2005-05-02</td>
                            <td>40</td>
                        </tr>
                        <tr>
                            <td>2005-05-02</td>
                            <td>500</td>
                        </tr>
                        <tr>
                            <td>2005-05-02</td>
                            <td>40</td>
                        </tr>
                        <tr>
                            <td>2005-05-02</td>
                            <td>500</td>
                        </tr>
                        <tr>
                            <td>2005-05-02</td>
                            <td>40</td>
                        </tr>
                        <tr>
                            <td>2005-05-02</td>
                            <td>500</td>
                        </tr>
                        <tr>
                            <td>2005-05-02</td>
                            <td>40</td>
                        </tr>
                        <tr>
                            <td>2005-05-02</td>
                            <td>500</td>
                        </tr>
                        <tr>
                            <td>2005-05-02</td>
                            <td>40</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- page number -->
            <div class="page-num mT20">
            <div class="inner">
                <li><a href="#" class="first"></a></li>
                <li><a href="#" class="prev"></a></li>
                <li>
                    <a href="#" class="active">1</a>
                    <a href="#">2</a>
                    <a href="#">3</a>
                    <a href="#">4</a>
                    <a href="#">5</a>
                </li>
                <li><a href="#" class="next"></a></li>
                <li><a href="#" class="last"></a></li>
            </div>
        </div>
        <!--// page number -->
        </section>
        <!-- //carbon-content -->

        <div class="qr-inventory">
            <span>재고</span> 1,200건
        </div>

    </div>
    <!-- //content-wrap -->
	</div>
	<th:block layout:fragment="footer" th:insert="~{@{/mobile/layout/footer}}"></th:block>

    <script type="text/javascript" src="../resources/js/content.js"></script>
    <script type="text/javascript" src="../resources/js/swiper-bundle.min.js"></script>

</body>
</html>
